<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shikooya — Measurement (Ages 5–7)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');
  :root{
    --txt:#1a1a2e;--panel:rgba(255,255,255,0.95);
    --brown:#6d4c41;--amber:#f59e0b;--green:#43a047;--rose:#e91e63;--violet:#7c5cfc;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,#fff3e0 0%,#ffe0b2 100%);
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:16px;
  }
  .header{text-align:center;margin-bottom:12px;width:100%;max-width:700px;}
  .age-badge{display:inline-block;background:linear-gradient(135deg,#8d6e63,#4e342e);
    color:#fff;font-size:13px;font-weight:900;letter-spacing:.06em;
    text-transform:uppercase;padding:5px 18px;border-radius:20px;margin-bottom:8px;
    box-shadow:0 3px 10px rgba(78,52,46,.3);}
  .header h1{font-family:'Fredoka One',cursive;font-size:clamp(22px,5vw,32px);
    color:#4e342e;text-shadow:0 2px 6px rgba(0,0,0,.1);line-height:1.2;}
  .header h1 span{color:#f57c00;}
  .card{background:var(--panel);border-radius:28px;padding:20px;
    max-width:700px;width:100%;
    box-shadow:0 12px 48px rgba(0,0,0,.12);border:3px solid rgba(210,160,90,.4);}

  /* Steps — 5 steps = d0..d4 */
  .steps{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
  .step-dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:all .3s;}
  .step-dot.active{background:#f59e0b;transform:scale(1.5);}
  .step-dot.done{background:#43a047;}

  /* Nia */
  .nia-area{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;min-height:60px;}
  .nia-avatar{width:52px;height:52px;flex-shrink:0;
    background:linear-gradient(135deg,#8d6e63,#4e342e);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:26px;
    box-shadow:0 4px 12px rgba(78,52,46,.3);animation:bob 2.5s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .nia-bubble{background:linear-gradient(135deg,#fff8f0,#fff3e0);
    border:2.5px solid #ffcc80;border-radius:16px 16px 16px 4px;
    padding:12px 16px;font-size:clamp(14px,3vw,17px);font-weight:700;
    color:var(--txt);line-height:1.6;flex:1;}
  .nia-bubble strong{color:#4e342e;}
  .nia-bubble em{color:#f57c00;font-style:normal;font-weight:900;}

  /* Preface */
  .preface{background:linear-gradient(135deg,#fff8f0,#f1f8e9);
    border-radius:18px;padding:16px 18px;margin-bottom:16px;
    border:2.5px solid #ffcc80;}
  .preface-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;
    font-size:clamp(13px,2.5vw,15px);font-weight:700;color:var(--txt);line-height:1.6;}
  .preface-row:last-child{margin-bottom:0;}
  .preface-icon{font-size:22px;flex-shrink:0;margin-top:2px;}

  /* Bakery scene */
  .bakery-scene{
    background:linear-gradient(180deg,#fff8f0 0%,#ffe0b2 70%,#bcaaa4 70%,#a1887f 100%);
    border-radius:20px;border:3px solid #ffcc80;
    padding:20px 16px 16px;margin-bottom:12px;
    position:relative;overflow:hidden;min-height:200px;}
  .bakery-shelf{position:absolute;bottom:28%;left:0;right:0;height:12px;
    background:linear-gradient(180deg,#8d6e63,#6d4c41);border-radius:0;}
  .bakery-counter{position:absolute;bottom:0;left:0;right:0;height:28%;
    background:linear-gradient(180deg,#bcaaa4,#a1887f);}

  /* Bread loaves on shelf */
  .loaves-row{display:flex;gap:16px;justify-content:center;
    align-items:flex-end;position:relative;z-index:2;padding-bottom:32%;}

  /* Each loaf */
  .loaf-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
  .loaf-label{font-family:'Fredoka One',cursive;font-size:clamp(12px,2.5vw,15px);
    color:#4e342e;background:rgba(255,255,255,.85);padding:3px 10px;
    border-radius:8px;border:1.5px solid #ffcc80;white-space:nowrap;}
  .loaf-wrap:hover svg{filter:drop-shadow(0 0 8px rgba(255,152,0,.6));}
  .loaf-wrap.selected svg{filter:drop-shadow(0 0 12px rgba(245,124,0,.8));}

  /* Ruler — now SVG-based, no drag CSS needed */

  /* Comparison */
  .compare-row{display:flex;gap:12px;justify-content:center;
    flex-wrap:wrap;margin-bottom:12px;}
  .compare-card{background:rgba(255,255,255,.85);border:2.5px solid #ffcc80;
    border-radius:16px;padding:12px 16px;text-align:center;flex:1;min-width:120px;max-width:180px;}
  .compare-name{font-family:'Fredoka One',cursive;font-size:clamp(14px,3vw,18px);color:#4e342e;margin-bottom:6px;}
  .compare-bar-wrap{height:24px;background:#f5f5f5;border-radius:12px;
    overflow:hidden;border:2px solid #e0e0e0;margin-bottom:6px;}
  .compare-bar{height:100%;border-radius:10px;transition:width .6s ease;}
  .compare-len{font-family:'Fredoka One',cursive;font-size:clamp(14px,3vw,17px);color:#f57c00;}

  /* Quiz */
  .quiz-area{background:linear-gradient(135deg,#fff8f0,#f1f8e9);
    border-radius:18px;padding:16px 18px;margin-bottom:14px;
    border:2.5px solid #ffcc80;}
  .quiz-q{font-family:'Fredoka One',cursive;font-size:clamp(16px,4vw,22px);
    color:var(--txt);margin-bottom:14px;text-align:center;line-height:1.5;}
  .quiz-options{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .quiz-btn{min-width:100px;min-height:60px;border-radius:14px;
    border:3px solid #ddd;background:#fff;
    font-family:'Fredoka One',cursive;font-size:clamp(15px,3.5vw,19px);
    cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 3px 8px rgba(0,0,0,.1);color:var(--txt);padding:8px;}
  .quiz-btn:hover{transform:scale(1.08);border-color:#ffb300;}
  .quiz-btn.correct{background:linear-gradient(135deg,#66bb6a,#43a047);
    border-color:#2e7d32;color:#fff;animation:pop .4s ease;}
  .quiz-btn.wrong{background:linear-gradient(135deg,#ef9a9a,#e57373);
    border-color:#c62828;color:#fff;animation:shake .3s ease;}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .quiz-result{text-align:center;margin-top:10px;font-family:'Fredoka One',cursive;
    font-size:clamp(14px,3.5vw,18px);min-height:26px;}
  .quiz-result.correct{color:#2e7d32;}
  .quiz-result.wrong{color:#c62828;}

  .stars{display:flex;justify-content:center;gap:6px;margin-bottom:10px;}
  .star{font-size:28px;opacity:.25;transition:all .3s;}
  .star.earned{opacity:1;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}

  /* Nav */
  .controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;}
  .btn{min-width:64px;min-height:56px;padding:12px 20px;border-radius:16px;border:none;
    font-family:'Fredoka One',cursive;font-size:clamp(15px,3.5vw,19px);cursor:pointer;
    transition:all .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 0 rgba(0,0,0,.18);}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .btn-next{background:linear-gradient(135deg,#ff9800,#e65100);color:#fff;flex:1;max-width:220px;}
  .btn-next:hover{transform:translateY(-2px);}
  .btn-back{background:linear-gradient(135deg,#90a4ae,#607d8b);color:#fff;}
  .btn-back:hover{transform:translateY(-2px);}
  .btn-back:disabled{opacity:.3;cursor:not-allowed;transform:none;}

  .confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;
    pointer-events:none;z-index:100;overflow:hidden;}
  .confetti-piece{position:absolute;border-radius:2px;
    animation:confetti-fall 2s ease-in forwards;}
  @keyframes confetti-fall{
    0%{transform:translateY(-20px) rotate(0deg);opacity:1}
    100%{transform:translateY(100vh) rotate(720deg);opacity:0}
  }

  /* Back to menu button */
  .back-menu{position:fixed;top:12px;left:12px;z-index:200;
    display:flex;align-items:center;gap:6px;
    padding:7px 12px;border-radius:20px;border:1.5px solid rgba(79,70,229,.2);
    background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
    font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
    color:#4f46e5;text-decoration:none;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s;}
  .back-menu:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
</style>
</head>
<body>
<a class="back-menu" href="../../index.html">&#8592; All topics</a>

<div class="header">
  <div><span class="age-badge">Ages 5–7</span></div>
  <h1>The <span>Bakery</span> 🍞 — Learning Measurement!</h1>
</div>
<div class="card">
  <!-- 5 steps = d0..d4 -->
  <div class="steps">
    <div class="step-dot active" id="d0"></div>
    <div class="step-dot" id="d1"></div>
    <div class="step-dot" id="d2"></div>
    <div class="step-dot" id="d3"></div>
    <div class="step-dot" id="d4"></div>
  </div>
  <div class="nia-area">
    <div class="nia-avatar">🌟</div>
    <div class="nia-bubble" id="nia">
      Welcome to the bakery! 🍞 Baker Priya has made three loaves of bread. But which one is the <strong>longest</strong>? We need to <em>measure</em> them to find out!
    </div>
  </div>
  <div id="mainArea"></div>
  <div class="controls">
    <button class="btn btn-back" id="btnBack" onclick="goStep(-1)" disabled>← Back</button>
    <button class="btn btn-next" id="btnNext" onclick="goStep(1)">Let's go! →</button>
  </div>
</div>
<div class="confetti-container" id="confetti"></div>

<script>
var currentStep = 0;
var selectedLoaf = 0;
var rulerPos = 0; // 0-100
var quizIdx = 0;
var quizCorrect = 0;
var isDragging = false;

// Loaf data — lengths in cm (out of max 20)
var LOAVES = [
  { name:'Sourdough', emoji:'🍞', color:'#8d6e63', length:15, label:'15 cm' },
  { name:'Baguette',  emoji:'🥖', color:'#f9a825', length:20, label:'20 cm' },
  { name:'Rye Loaf',  emoji:'🍞', color:'#5d4037', length:10, label:'10 cm' },
];
var MAX_LEN = 20;

// 5 steps, 5 NIA, 5 BTNS
var NIA = [
  "Welcome to the bakery! 🍞 Baker Priya has made three loaves of bread. But which one is the <strong>longest</strong>? We need to <em>measure</em> them to find out!",
  "Tap each loaf to see how it lines up with the ruler below it! The <strong>green arrow</strong> shows the length and the <strong>red dot</strong> marks exactly where it ends on the ruler! 📏",
  "Now let us <strong>compare</strong> all three loaves side by side. Which is longest? Which is shortest? 🔍",
  "Quiz time! Use what you know about measuring to answer! 🌟",
  "Amazing! 🏆 You know how to measure — and why measuring matters!"
];

var BTNS = [
  "See the ruler! →",
  "Compare all three! →",
  "Quiz time! →",
  "See the summary! →",
  "🔁 Play Again!"
];

var quizQuestions = [
  { q:"The baguette is 20 cm. The rye loaf is 10 cm. Which is longer?",
    opts:["Baguette 🥖","Rye Loaf 🍞","They are equal","Cannot tell"], answer:"Baguette 🥖" },
  { q:"The sourdough is 15 cm long. How many cm shorter is the rye loaf (10 cm)?",
    opts:["3 cm","5 cm","10 cm","15 cm"], answer:"5 cm" },
  { q:"Baker Priya lines up three loaves. The longest is 20 cm. What bread is that?",
    opts:["Sourdough","Baguette","Rye Loaf","All the same"], answer:"Baguette" },
  { q:"We use a ruler to measure. What do we find out?",
    opts:["The colour","How long","How tasty","The name"], answer:"How long" },
];

// Helpers
function dots(s) {
  for (var i = 0; i <= 4; i++) {
    var d = document.getElementById('d' + i);
    if (d) d.className = 'step-dot' + (i < s ? ' done' : i === s ? ' active' : '');
  }
}

function confettiBurst() {
  var c = document.getElementById('confetti');
  c.innerHTML = '';
  var cols = ['#ffe066','#ff9800','#f44336','#43a047','#1976d2','#9c27b0'];
  for (var i = 0; i < 52; i++) {
    var p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = 'left:'+(Math.random()*100)+'%;background:'+cols[Math.floor(Math.random()*cols.length)]+
      ';width:'+(8+Math.random()*8)+'px;height:'+(8+Math.random()*8)+'px;' +
      'border-radius:'+(Math.random()>.5?'50%':'2px')+';' +
      'animation-delay:'+(Math.random()*.6)+'s;animation-duration:'+(1.5+Math.random())+'s';
    c.appendChild(p);
  }
  setTimeout(function(){ c.innerHTML=''; }, 3000);
}

// Draw loaf SVG
function loafSVG(loaf, w, h, highlight) {
  var col = loaf.color;
  var lighter = loaf.name === 'Baguette' ? '#ffcc02' : '#a1887f';
  var shadow = loaf.name === 'Baguette' ? '#f57f17' : '#3e2723';
  var glow = highlight ? 'filter:drop-shadow(0 0 10px rgba(255,152,0,.7))' : '';

  if (loaf.name === 'Baguette') {
    return '<svg viewBox="0 0 ' + w + ' 50" width="' + w + '" height="50" style="' + glow + '">' +
      '<ellipse cx="' + (w/2) + '" cy="25" rx="' + (w/2-4) + '" ry="18" fill="' + col + '" stroke="' + shadow + '" stroke-width="3"/>' +
      '<ellipse cx="' + (w/2) + '" cy="22" rx="' + (w/2-10) + '" ry="10" fill="' + lighter + '" opacity="0.5"/>' +
      '<line x1="20" y1="20" x2="' + (w-20) + '" y2="16" stroke="' + shadow + '" stroke-width="2" stroke-dasharray="8,6" stroke-linecap="round"/>' +
      '</svg>';
  }
  return '<svg viewBox="0 0 ' + w + ' 56" width="' + w + '" height="56" style="' + glow + '">' +
    '<rect x="6" y="18" width="' + (w-12) + '" height="32" rx="8" fill="' + col + '" stroke="' + shadow + '" stroke-width="3"/>' +
    '<ellipse cx="' + (w/2) + '" cy="18" rx="' + (w/2-6) + '" ry="14" fill="' + col + '" stroke="' + shadow + '" stroke-width="3"/>' +
    '<ellipse cx="' + (w/2) + '" cy="15" rx="' + (w/2-14) + '" ry="8" fill="' + lighter + '" opacity="0.4"/>' +
    '<line x1="20" y1="30" x2="' + (w-20) + '" y2="30" stroke="' + shadow + '" stroke-width="1.5" stroke-dasharray="6,5" stroke-linecap="round"/>' +
    '</svg>';
}

// ── STEP 0 — Preface ─────────────────────────────────────
function renderStep0() {
  var loavesPreview = LOAVES.map(function(l, i) {
    var w = Math.round((l.length / MAX_LEN) * 140) + 40;
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:4px">' +
      loafSVG(l, w, 56, false) +
      '<div style="font-family:Fredoka One,cursive;font-size:13px;color:#4e342e">' + l.name + '</div>' +
      '</div>';
  }).join('');

  document.getElementById('mainArea').innerHTML =
    '<div class="preface">' +
    '<div class="preface-row"><div class="preface-icon">📘</div><div><strong>What you will learn:</strong> What measurement means — finding out how long something is using a standard unit.</div></div>' +
    '<div class="preface-row"><div class="preface-icon">🌍</div><div><strong>Why it matters:</strong> Without measuring, how would a baker know how long to make a baguette? How would a builder know if a door fits? Measuring lets us describe size precisely.</div></div>' +
    '<div class="preface-row"><div class="preface-icon">🎯</div><div><strong>By the end:</strong> You will be able to use a ruler to measure length — and compare which objects are longer or shorter!</div></div>' +
    '</div>' +
    '<div style="background:linear-gradient(180deg,#fff8f0 0%,#ffe0b2 100%);' +
    'border-radius:20px;border:3px solid #ffcc80;padding:20px 16px 16px;margin-bottom:4px">' +
    '<div style="display:flex;align-items:flex-end;justify-content:center;gap:24px;flex-wrap:wrap;' +
    'padding-bottom:12px;border-bottom:4px solid #8d6e63">' +
    loavesPreview +
    '</div>' +
    '<div style="display:flex;justify-content:center;gap:24px;flex-wrap:wrap;' +
    'background:#bcaaa4;border-radius:0 0 16px 16px;margin:0 -16px -16px;padding:8px 16px">' +
    LOAVES.map(function(l){
      return '<div style="font-family:Fredoka One,cursive;font-size:clamp(13px,2.5vw,16px);color:#fff;text-align:center;min-width:80px">' + l.emoji + ' ' + l.name + '</div>';
    }).join('') +
    '</div>' +
    '</div>';
}

// ── STEP 1 — Measure ─────────────────────────────────────
function renderStep1() {
  selectedLoaf = 0;
  buildMeasureScene();
}

function buildMeasureScene() {
  var loaf = LOAVES[selectedLoaf];
  var RULER_MAX = 20; // ruler shows 0-20 cm
  var RULER_W = 280;  // px width of ruler in SVG

  // Build SVG showing loaf above ruler, aligned left
  // Ruler: 280px wide = 20cm, so 14px per cm
  var PX_PER_CM = RULER_W / RULER_MAX;
  var loafPx = Math.round(loaf.length * PX_PER_CM);
  var svgW = RULER_W + 60; // extra padding left+right
  var offsetX = 30; // left margin inside SVG

  // Ruler tick marks
  var ticks = '';
  for (var i = 0; i <= RULER_MAX; i++) {
    var tx = offsetX + i * PX_PER_CM;
    var tickH = i % 5 === 0 ? 14 : 8;
    ticks += '<line x1="' + tx + '" y1="80" x2="' + tx + '" y2="' + (80+tickH) + '" stroke="#f9a825" stroke-width="' + (i%5===0?2:1) + '"/>';
    if (i % 5 === 0) {
      ticks += '<text x="' + tx + '" y="104" text-anchor="middle" font-size="11" fill="#e65100" font-family="Fredoka One,cursive">' + i + '</text>';
    }
  }

  // Loaf above ruler — width proportional to length
  var loafH = loaf.name === 'Baguette' ? 32 : 40;
  var loafY = 30;
  var loafSvg = '';
  if (loaf.name === 'Baguette') {
    loafSvg = '<ellipse cx="' + (offsetX + loafPx/2) + '" cy="' + (loafY+16) + '" rx="' + (loafPx/2) + '" ry="15" fill="' + loaf.color + '" stroke="#f57f17" stroke-width="2.5"/>' +
      '<ellipse cx="' + (offsetX + loafPx/2) + '" cy="' + (loafY+13) + '" rx="' + (loafPx/2 - 8) + '" ry="8" fill="#ffcc02" opacity="0.4"/>' +
      '<line x1="' + (offsetX+16) + '" y1="' + (loafY+12) + '" x2="' + (offsetX+loafPx-16) + '" y2="' + (loafY+10) + '" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="6,5" stroke-linecap="round"/>';
  } else {
    loafSvg = '<rect x="' + offsetX + '" y="' + (loafY+10) + '" width="' + loafPx + '" height="26" rx="6" fill="' + loaf.color + '" stroke="#3e2723" stroke-width="2.5"/>' +
      '<ellipse cx="' + (offsetX + loafPx/2) + '" cy="' + (loafY+10) + '" rx="' + (loafPx/2 - 4) + '" ry="11" fill="' + loaf.color + '" stroke="#3e2723" stroke-width="2.5"/>' +
      '<ellipse cx="' + (offsetX + loafPx/2) + '" cy="' + (loafY+8) + '" rx="' + (loafPx/2 - 12) + '" ry="6" fill="#a1887f" opacity="0.35"/>';
  }

  // Measurement arrow below loaf, above ruler
  var arrowY = loafY + loafH + 4;
  var arrowSvg = '<line x1="' + offsetX + '" y1="' + arrowY + '" x2="' + (offsetX+loafPx) + '" y2="' + arrowY + '" stroke="#43a047" stroke-width="2.5"/>' +
    '<polygon points="' + offsetX + ',' + arrowY + ' ' + (offsetX+8) + ',' + (arrowY-5) + ' ' + (offsetX+8) + ',' + (arrowY+5) + '" fill="#43a047"/>' +
    '<polygon points="' + (offsetX+loafPx) + ',' + arrowY + ' ' + (offsetX+loafPx-8) + ',' + (arrowY-5) + ' ' + (offsetX+loafPx-8) + ',' + (arrowY+5) + '" fill="#43a047"/>' +
    '<text x="' + (offsetX + loafPx/2) + '" y="' + (arrowY-4) + '" text-anchor="middle" font-size="13" fill="#2e7d32" font-family="Fredoka One,cursive">' + loaf.label + '</text>';

  // Vertical guide line from end of loaf down to ruler mark
  var guideSvg = '<line x1="' + (offsetX+loafPx) + '" y1="' + loafY + '" x2="' + (offsetX+loafPx) + '" y2="80" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4,3"/>' +
    '<circle cx="' + (offsetX+loafPx) + '" cy="80" r="4" fill="#e53935"/>';

  // Ruler body
  var rulerSvg = '<rect x="' + offsetX + '" y="78" width="' + RULER_W + '" height="20" rx="4" fill="#fff176" stroke="#f9a825" stroke-width="2.5"/>' +
    ticks;

  // cm label
  var labelSvg = '<text x="' + (offsetX + RULER_W/2) + '" y="116" text-anchor="middle" font-size="10" fill="#999" font-family="Nunito,sans-serif">centimetres (cm)</text>';

  var fullSvg = '<svg viewBox="0 0 ' + svgW + ' 120" width="100%" style="display:block;max-width:380px;margin:0 auto">' +
    loafSvg + arrowSvg + guideSvg + rulerSvg + labelSvg + '</svg>';

  // Loaf selector tabs
  var tabs = LOAVES.map(function(l, i) {
    return '<button onclick="selectLoaf(' + i + ')" style="' +
      'padding:8px 14px;border-radius:12px;border:2.5px solid ' + (i===selectedLoaf?'#f57c00':'#ddd') + ';' +
      'background:' + (i===selectedLoaf?'rgba(245,124,0,.12)':'#fff') + ';' +
      'font-family:Fredoka One,cursive;font-size:clamp(13px,2.5vw,15px);cursor:pointer;color:#4e342e;' +
      'transition:all .2s">' +
      l.emoji + ' ' + l.name + '</button>';
  }).join('');

  document.getElementById('mainArea').innerHTML =
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">' + tabs + '</div>' +
    '<div style="background:linear-gradient(180deg,#fff8f0,#ffe0b2);border-radius:18px;border:3px solid #ffcc80;padding:16px;margin-bottom:10px">' +
    fullSvg +
    '</div>' +
    '<div style="text-align:center;background:rgba(255,255,255,.85);border:2px solid #ffcc80;border-radius:12px;padding:10px 14px">' +
    '<span style="font-family:Fredoka One,cursive;font-size:clamp(16px,4vw,22px);color:#4e342e">' +
    loaf.emoji + ' ' + loaf.name + ' = <span style="color:#f57c00">' + loaf.label + '</span></span>' +
    '</div>';
}

function selectLoaf(idx) {
  selectedLoaf = idx;
  buildMeasureScene();
  document.getElementById('nia').innerHTML =
    'The <strong>' + LOAVES[idx].name + '</strong> is <em>' + LOAVES[idx].label + '</em> long! See how it lines up with the ruler below it! The red dot shows exactly where it ends on the ruler. 📏';
}

// ── STEP 2 — Compare ─────────────────────────────────────
function renderStep2() {
  var maxLen = Math.max.apply(null, LOAVES.map(function(l){ return l.length; }));
  var minLen = Math.min.apply(null, LOAVES.map(function(l){ return l.length; }));
  var longest = LOAVES.filter(function(l){ return l.length === maxLen; })[0];
  var shortest = LOAVES.filter(function(l){ return l.length === minLen; })[0];

  var bars = LOAVES.map(function(l, i) {
    var pct = Math.round((l.length / maxLen) * 100);
    var isLong = l.length === maxLen;
    var isShort = l.length === minLen;
    return '<div class="compare-card">' +
      '<div class="compare-name">' + l.emoji + ' ' + l.name + '</div>' +
      '<div class="compare-bar-wrap">' +
      '<div class="compare-bar" style="width:' + pct + '%;background:' + (isLong?'#43a047':isShort?'#f44336':'#ff9800') + '"></div>' +
      '</div>' +
      '<div class="compare-len">' + l.label + '</div>' +
      '</div>';
  }).join('');

  document.getElementById('mainArea').innerHTML =
    '<div style="font-family:Fredoka One,cursive;font-size:clamp(14px,3vw,18px);color:#4e342e;text-align:center;margin-bottom:12px">Compare all three loaves!</div>' +
    '<div class="compare-row">' + bars + '</div>' +
    '<div style="background:rgba(255,255,255,.85);border:2.5px solid #ffcc80;border-radius:14px;padding:12px 16px">' +
    '<div style="font-size:clamp(13px,2.5vw,15px);font-weight:700;color:var(--txt);line-height:1.8">' +
    '🏆 <strong>Longest:</strong> ' + longest.name + ' — ' + longest.label + '<br>' +
    '📏 <strong>Middle:</strong> Sourdough — 15 cm<br>' +
    '🔻 <strong>Shortest:</strong> ' + shortest.name + ' — ' + shortest.label +
    '</div></div>';

  document.getElementById('nia').innerHTML =
    'The <strong>' + longest.name + '</strong> is the longest at <em>' + longest.label + '</em>! The <strong>' + shortest.name + '</strong> is the shortest at <em>' + shortest.label + '</em>! Measuring lets us compare fairly!';
}

// ── STEP 3 — Quiz ─────────────────────────────────────────
function renderStep3() {
  quizIdx = 0;
  quizCorrect = 0;
  showQuizQ();
}

function showQuizQ() {
  if (quizIdx >= quizQuestions.length) { showQuizEnd(); return; }
  var q = quizQuestions[quizIdx];
  var stars = '';
  for (var i = 0; i < quizQuestions.length; i++)
    stars += '<div class="star' + (i < quizCorrect ? ' earned' : '') + '">⭐</div>';
  var opts = '';
  q.opts.forEach(function(o) {
    opts += '<button class="quiz-btn" onclick="answerQ(\'' + o.replace(/'/g,"\\'") + '\',\'' + q.answer.replace(/'/g,"\\'") + '\')">' + o + '</button>';
  });
  document.getElementById('mainArea').innerHTML =
    '<div class="stars">' + stars + '</div>' +
    '<div class="quiz-area">' +
    '<div class="quiz-q">' + q.q + '</div>' +
    '<div class="quiz-options">' + opts + '</div>' +
    '<div class="quiz-result" id="qRes"></div>' +
    '</div>';
}

function answerQ(chosen, correct) {
  var btns = document.querySelectorAll('.quiz-btn');
  btns.forEach(function(b){ b.disabled = true; });
  var res = document.getElementById('qRes');
  if (chosen === correct) {
    btns.forEach(function(b){ if(b.textContent.trim()===correct) b.className='quiz-btn correct'; });
    quizCorrect++;
    if(res){res.textContent='✅ Correct!';res.className='quiz-result correct';}
    document.getElementById('nia').innerHTML = '✅ <strong>Correct!</strong> Great measuring knowledge! 📏';
  } else {
    btns.forEach(function(b){
      if(b.textContent.trim()===chosen) b.className='quiz-btn wrong';
      if(b.textContent.trim()===correct) b.className='quiz-btn correct';
    });
    if(res){res.textContent='❌ Not quite! The answer is: '+correct;res.className='quiz-result wrong';}
    document.getElementById('nia').innerHTML = '💛 The answer is <strong>' + correct + '</strong>!';
  }
  quizIdx++;
  if(chosen === correct){
    var _adv=false;
    function _doAdv(){if(_adv)return;_adv=true;showQuizQ();}
    var _t=setTimeout(_doAdv,1500);
    var nxtOk=document.createElement('button');
    nxtOk.textContent='Next \u2192';
    nxtOk.style.cssText='display:block;margin:14px auto 0;padding:10px 28px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.12)';
    nxtOk.onclick=function(){clearTimeout(_t);_doAdv();};
    var _r=document.getElementById('quizResult')||document.getElementById('qResult')||document.getElementById('qRes');
    if(_r&&_r.parentNode)_r.parentNode.appendChild(nxtOk);
  } else {
    var nxt2=document.createElement('button');
    nxt2.textContent='Next \u2192';
    nxt2.style.cssText='display:block;margin:14px auto 0;padding:10px 28px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.12)';
    nxt2.onclick=function(){showQuizQ();};
    var _r2=document.getElementById('quizResult')||document.getElementById('qResult')||document.getElementById('qRes');
    if(_r2&&_r2.parentNode)_r2.parentNode.appendChild(nxt2);
  }
}

function showQuizEnd() {
  var stars = '';
  for(var i=0;i<quizQuestions.length;i++)
    stars+='<div class="star'+(i<quizCorrect?' earned':'')+'">⭐</div>';
  var msg = quizCorrect===4?'🏆 PERFECT! You are a measuring expert!':
            quizCorrect>=3?'🌟 Brilliant! Almost perfect!':
            quizCorrect>=2?'👍 Good work! Keep practising!':'💪 Keep measuring — you will get there!';
  document.getElementById('mainArea').innerHTML =
    '<div class="stars">'+stars+'</div>'+
    '<div style="text-align:center;padding:16px;background:linear-gradient(135deg,#fff8f0,#f1f8e9);border-radius:18px;border:2.5px solid #ffcc80">'+
    '<div style="font-family:Fredoka One,cursive;font-size:clamp(17px,4vw,24px);color:#4e342e;margin-bottom:8px">'+msg+'</div>'+
    '<div style="font-size:clamp(14px,3vw,17px);font-weight:700;color:#555">You got <strong style="color:#e53935">'+quizCorrect+'</strong> out of <strong>4</strong> correct!</div>'+
    '</div>';
  if(quizCorrect>=3) confettiBurst();
  document.getElementById('nia').innerHTML = quizCorrect===4?
    '🏆 <strong>Perfect!</strong> You measured every question perfectly! 📏':
    '🌟 Well done! Remember — a ruler tells us exactly how <em>long</em> something is!';
}

// ── STEP 4 — Summary ──────────────────────────────────────
function renderStep4() {
  document.getElementById('mainArea').innerHTML =
    '<div style="text-align:center;padding:8px 0 14px">'+
    '<div style="font-size:64px">🏆</div>'+
    '<div style="font-family:Fredoka One,cursive;font-size:clamp(17px,4vw,24px);color:#4e342e;margin-top:8px;margin-bottom:14px">You can measure!</div>'+
    '</div>'+
    '<div class="preface">'+
    '<div class="preface-row"><div class="preface-icon">✅</div><div><strong>Measurement</strong> means finding out exactly how long, tall or wide something is.</div></div>'+
    '<div class="preface-row"><div class="preface-icon">✅</div><div>We use a <strong>ruler</strong> to measure length. The numbers on a ruler are in <strong>centimetres (cm)</strong>.</div></div>'+
    '<div class="preface-row"><div class="preface-icon">✅</div><div>Measuring lets us <strong>compare</strong> — we can say exactly which is longer or shorter!</div></div>'+
    '<div class="preface-row"><div class="preface-icon">🚀</div><div>Next — we explore <strong>pattern recognition</strong> in the mathematical thinking series!</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap">'+
    LOAVES.map(function(l){
      var w = Math.round((l.length/MAX_LEN)*120)+30;
      return '<div style="text-align:center;background:rgba(255,255,255,.8);border:2px solid #ffcc80;border-radius:12px;padding:10px 14px">'+
        loafSVG(l,w,50,false)+
        '<div style="font-family:Fredoka One,cursive;font-size:clamp(13px,3vw,16px);color:#4e342e;margin-top:4px">'+l.name+'</div>'+
        '<div style="font-family:Fredoka One,cursive;font-size:clamp(14px,3vw,18px);color:#f57c00">'+l.label+'</div>'+
        '</div>';
    }).join('')+
    '</div>';
  confettiBurst();
}

// ── Navigation ────────────────────────────────────────────
var RENDERS = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4];

function goStep(dir) {
  currentStep = Math.max(0, Math.min(4, currentStep + dir));
  dots(currentStep);
  document.getElementById('nia').innerHTML = NIA[currentStep];
  document.getElementById('btnBack').disabled = (currentStep === 0);
  document.getElementById('btnNext').textContent = BTNS[currentStep];
  document.getElementById('btnNext').disabled = false;
  if (currentStep === 4) {
    document.getElementById('btnNext').onclick = function(){ goStep(-4); };
  } else {
    document.getElementById('btnNext').onclick = function(){ goStep(1); };
  }
  RENDERS[currentStep]();
}

goStep(0);
</script>
</body>
</html>
